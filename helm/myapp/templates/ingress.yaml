apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentiment-app-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentiment-app
                port:
                  number: {{ .Values.app.servicePort }}
